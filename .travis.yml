sudo: false

language: python

python:
    - "3.6"

os:
    - linux
    - osx
    - windows

install:
    - pip install .
    - pip install -r requirements.txt
    - pip install -r requirements_devel.txt
    
script: 
    - paver
   
after_success:
    - coverage combine ./.coverage ./tests/behave/features/.coverage
    - codecov

